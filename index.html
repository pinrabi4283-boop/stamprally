<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Webスタンプラリー</title>
    <style>
      :root{--gap:12px;--btn-h:56px;--max:720px}
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;margin:0;padding:16px;max-width:var(--max);margin-left:auto;margin-right:auto;background:#fafafa}
      header{display:flex;flex-direction:column;gap:8px}
      h1{margin:0;font-size:1.2rem}
      .controls{display:flex;flex-direction:column;gap:8px;margin-top:8px}
      select,button{font-size:1rem;padding:0 12px;height:var(--btn-h);border-radius:10px;border:1px solid #ccc;background:#fff}
      button{cursor:pointer}
      #video{width:100%;height:auto;border-radius:10px;background:#000;border:1px solid #ddd}
      #stamp-list{display:flex;flex-wrap:wrap;gap:var(--gap);margin-top:12px}
      .stamp{flex:0 0 45%;min-width:120px;border-radius:8px;padding:8px;background:#fff;border:1px solid #eee;box-shadow:0 1px 2px rgba(0,0,0,.03)}
      .stamp.collected{background:#e8ffea}
      .stamp img{width:100%;height:auto;border-radius:6px;display:block}
      #message,#participant-message{margin:6px 0;color:#333}
      @media(min-width:600px){.stamp{flex:0 0 30%}}
    </style>
  </head>
  <body>
    <header>
      <h1>Webスタンプラリー</h1>
      <p style="margin:0">書籍の管理コードを先に読み取ると自動で参加者登録されます。</p>
    </header>

    <div class="controls">
      <label for="participantSelect">参加者</label>
      <select id="participantSelect"></select>
      <div style="display:flex;gap:8px">
        <button id="scanButton">QR読み取り開始</button>
        <button id="stopButton" style="background:#f5f5f5">停止</button>
      </div>
    </div>

    <div style="margin-top:10px">
      <video id="video" playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
    </div>

    <p id="participant-message"></p>
    <p id="message"></p>

    <h2>貯めたスタンプ</h2>
    <div id="stamp-list"></div>
    <div id="special"></div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
      // 既存のスクリプトをそのまま使う（SHEET_API_URL を最新に）
      const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbyWbPWbE0EVAFjTtp9PhNQe92TmvDRhJ45PnDraSmCsO9VSyqrsGGW4f8R-INWGpZlO/exec';
      // 以降は既存のロジック（省略）...
      // 小さな改善点:
      //  - getUserMedia のオプションで背面カメラ優先:
      //      { video: { facingMode: { ideal: "environment" } } }
      //  - 停止ボタンを追加してカメラ停止を即時行う
    </script>
  </body>
</html>
